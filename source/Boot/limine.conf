 timeout: 5
# The entry name that will be displayed in the boot menu.
/QuantumNEC
    # We use the Limine boot protocol.
    protocol: limine
    kaslr: no
    # Path to the kernel to boot. boot():/ represents the partition on which limine.conf is located.
    kernel_path: boot():/boot/kernel
    kernel_path: boot():/QuantumNEC/micro_kernel.elf
    resolution: 1920x1080x32
    paging_mode: 4level
    module_path: boot():QuantumNEC/SYSTEM64/switch_to.bin
    module_path: boot():QuantumNEC/SYSTEM64/to_process.bin
    module_path: boot():QuantumNEC/SYSTEM64/servicer.elf
